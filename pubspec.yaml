name: vocalia
description: "Vocalia — AAC app powered by AI. Translates pictogram sequences into natural language."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  # UI
  google_fonts: ^6.2.1
  provider: ^6.1.2
  go_router: ^14.8.1
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.2
  # Text-to-Speech
  flutter_tts: ^4.2.0
  # AI
  google_generative_ai: ^0.4.7
  # Storage & State
  shared_preferences: ^2.3.4
  uuid: ^4.5.1
  # Utils
  intl: ^0.19.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/pictograms/
